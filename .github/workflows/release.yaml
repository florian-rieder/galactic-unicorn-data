name: Release build
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: make build

      - uses: softprops/action-gh-release@v3
        with:
          working_directory: dist
          files: |
            data.zip

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Make a pages deployment, just to get an HTTP fetchable without a 302 CORS error
  # See https://blog.jim-nielsen.com/2021/fetch-and-3xx-redirect-status-codes/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
